name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run daily to catch OpenAPI spec drift
    - cron: "0 8 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

  openapi-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest OpenAPI spec
        run: curl -sSf https://api.tryvital.io/openapi.json -o /tmp/openapi-latest.json

      - name: Check for spec changes
        run: |
          if ! diff -q tests/openapi.json /tmp/openapi-latest.json > /dev/null 2>&1; then
            echo "::warning::OpenAPI spec has changed! Run: curl -sSf https://api.tryvital.io/openapi.json -o tests/openapi.json"
            echo ""
            echo "Spec version in repo: $(jq -r '.info.version' tests/openapi.json)"
            echo "Latest spec version:  $(jq -r '.info.version' /tmp/openapi-latest.json)"
            exit 1
          else
            echo "OpenAPI spec is up to date (version: $(jq -r '.info.version' tests/openapi.json))"
          fi
